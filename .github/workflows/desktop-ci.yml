name: Desktop CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - feat/**

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: License + Tests + Builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: License gate
        run: npm run licenses:check

      - name: Generate third-party notices
        run: npm run licenses:notices

      - name: Verify notices committed
        run: git diff --exit-code -- THIRD_PARTY_NOTICES.md

      - name: Unit tests
        run: npm run test

      - name: Web build
        run: npm run build

      - name: Desktop build
        run: npm run build:desktop

  long-file-memory:
    name: Long-file memory smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Long-file memory behavior check
        run: npm run qa:memory-long-file

  package-smoke:
    name: Package smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: --linux
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win
    defaults:
      run:
        working-directory: app
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundles
        run: npm run build:desktop

      - name: Package smoke build
        run: npm run qa:package-smoke
        env:
          PACKAGE_SMOKE_TARGET: ${{ matrix.target }}

  desktop-build-artifacts:
    name: Desktop build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-appimage
            os: ubuntu-latest
            build_args: --linux AppImage --x64 --publish never
            artifact_glob: app/release/*.AppImage
          - name: windows-x64
            os: windows-latest
            build_args: --win nsis --x64 --publish never
            artifact_glob: app/release/*.exe
          - name: macos-arm64
            os: macos-14
            build_args: --mac dmg --arm64 --publish never
            artifact_glob: app/release/*.dmg
    defaults:
      run:
        working-directory: app
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build desktop artifacts
        run: npm run dist:desktop -- ${{ matrix.build_args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 14
          if-no-files-found: error
