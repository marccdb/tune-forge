name: Desktop CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - feat/**
    tags:
      - v*

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync-version-from-tag:
    name: Sync app version from tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update package version files
        working-directory: app
        run: |
          release_version="${RELEASE_VERSION#v}"
          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be semver-like (vX.Y.Z). Got: ${RELEASE_VERSION}"
            exit 1
          fi

          current_version="$(node -p "require('./package.json').version")"
          if [ "$current_version" = "$release_version" ]; then
            echo "Version already synced: $current_version"
            exit 0
          fi

          npm version "$release_version" --no-git-tag-version --allow-same-version

      - name: Commit and push version sync
        run: |
          if git diff --quiet -- app/package.json app/package-lock.json; then
            echo "No version file changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/package.json app/package-lock.json
          git commit -m "chore: sync app version to ${RELEASE_VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

  quality:
    name: License + Tests + Builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: License gate
        run: npm run licenses:check

      - name: Generate third-party notices
        run: npm run licenses:notices

      - name: Verify notices committed
        run: git diff --exit-code -- THIRD_PARTY_NOTICES.md

      - name: Unit tests
        run: npm run test

      - name: Web build
        run: npm run build

      - name: Desktop build
        run: npm run build:desktop

  long-file-memory:
    name: Long-file memory smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Long-file memory behavior check
        run: npm run qa:memory-long-file

  package-smoke:
    name: Package smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: --linux
          - os: macos-latest
            target: --mac
          - os: windows-latest
            target: --win
    defaults:
      run:
        working-directory: app
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundles
        run: npm run build:desktop

      - name: Package smoke build
        run: npm run qa:package-smoke
        env:
          PACKAGE_SMOKE_TARGET: ${{ matrix.target }}

  prepare-release:
    name: Prepare GitHub release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs:
      - quality
      - long-file-memory
      - package-smoke
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-tag.outputs.release_tag }}
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=build-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.release-tag.outputs.release_tag }}
        run: |
          gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1 || gh release create "$TAG" --repo "$GH_REPO" --generate-notes --title "$TAG"

  desktop-release-assets:
    name: Desktop release (${{ matrix.name }})
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-appimage
            os: ubuntu-latest
            build_args: --linux AppImage --x64 --publish never
            release_glob: release/*.AppImage
          - name: windows-x64
            os: windows-latest
            build_args: --win nsis --x64 --publish never
            release_glob: release/*.exe
          - name: macos-arm64
            os: macos-14
            build_args: --mac dmg --arm64 --publish never
            release_glob: release/*.dmg
    defaults:
      run:
        working-directory: app
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Align package version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build desktop artifacts
        run: npm run dist:desktop -- ${{ matrix.build_args }}

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_GLOB: ${{ matrix.release_glob }}
        run: |
          shopt -s nullglob
          files=($RELEASE_GLOB)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found for pattern: $RELEASE_GLOB"
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --repo "$GH_REPO" --clobber
